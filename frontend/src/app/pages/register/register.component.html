<div class="page-container">
  <div class="card">
    <h1 class="card-title">Crear Cuenta</h1>
    <p class="card-subtitle">Únete a la plataforma</p>

    <form (ngSubmit)="onRegister()" #registerForm="ngForm">

      <div class="form-group">
        <label for="name">Nombre</label>
        <input
          id="name"
          type="text"
          name="name"
          [(ngModel)]="payload.name"
          required
          placeholder="Tu nombre"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          name="email"
          [(ngModel)]="payload.email"
          required
          placeholder="tu@email.com"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="payload.password"
          required
          minlength="6"
          placeholder="Mínimo 6 caracteres"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="organizacion">ID de Organización</label>
        <input
          id="organizacion"
          type="text"
          name="organizacion"
          [(ngModel)]="payload.organizacion"
          required
          pattern="^[0-9a-fA-F]{24}$"
          placeholder="ObjectId de MongoDB (24 hex)"
          class="form-input"
        />
        <small class="form-hint">ObjectId de 24 caracteres hexadecimales</small>
      </div>

      <div *ngIf="errorMessage" class="alert alert-error">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading || registerForm.invalid">
        <span *ngIf="loading">Registrando...</span>
        <span *ngIf="!loading">Registrarse</span>
      </button>

    </form>

    <p class="redirect-text">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="link">Inicia sesión aquí</a>
    </p>
  </div>
</div>
